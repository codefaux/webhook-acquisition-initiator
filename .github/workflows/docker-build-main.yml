name: Build and Push Docker Image (main)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build-main.yml'
  schedule:
    - cron: '47 8 * * *' # Daily

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: ghcr.io/codefaux/ytdlp-python-base:latest

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Get latest base image digest
        id: base_digest
        run: |
          DIGEST=$(docker manifest inspect $BASE_IMAGE | jq -r '.config.digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Read previous digest
        id: prev_digest
        run: |
          if [ -f .last-base-digest ]; then
            echo "digest=$(cat .last-base-digest)" >> $GITHUB_OUTPUT
          else
            echo "digest=none" >> $GITHUB_OUTPUT
          fi

      - name: Check if base image changed
        id: changed
        run: |
          if [ "${{ steps.base_digest.outputs.digest }}" != "${{ steps.prev_digest.outputs.digest }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no change (scheduled runs only)
        if: github.event_name == 'schedule' && steps.changed.outputs.changed == 'false'
        run: |
          echo "No base image change detected. Skipping automatic build."
          exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build version
        run: echo "BUILD_TAG=build-$(date +'%Y%m%d')-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Extract Branch Name
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Save new digest
        if: steps.changed.outputs.changed == 'true'
        run: echo "${{ steps.base_digest.outputs.digest }}" > .last-base-digest

      - name: Commit updated digest
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .last-base-digest
          git commit -m "Update base image digest"
          git push
