name: Build and Push Docker Image (main)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build-main.yml'
  schedule:
    - cron: '47 8 * * *' # Daily

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BASE_IMAGE: ghcr.io/codefaux/ytdlp-python-base:latest

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get latest base image digest
        id: base
        run: |
          DIGEST=$(docker manifest inspect $BASE_IMAGE | jq -r '.manifests[0].digest')
          SHORT=${DIGEST#sha256:}
          SHORT=${SHORT:0:12}
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT

      - name: Set image tag based on base image
        run: |
          echo "IMAGE_TAG=base-${{ steps.base.outputs.short }}" >> $GITHUB_ENV

      - name: Check if image already exists
        id: exists
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if already built (scheduled runs only)
        if: github.event_name == 'schedule' && steps.exists.outputs.exists == 'true'
        run: |
          echo "Image for this base already exists. Skipping."
          exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
